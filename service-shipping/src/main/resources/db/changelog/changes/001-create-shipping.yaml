databaseChangeLog:
  - changeSet:
      id: 001-create-shipments
      author: copilot
      changes:
        - createTable:
            tableName: shipments
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: order_id
                  type: UUID
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: tracking_code
                  type: VARCHAR(64)
                  constraints:
                    nullable: false
              - column:
                  name: status
                  type: VARCHAR(24)
                  constraints:
                    nullable: false
              - column:
                  name: shipped_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false
